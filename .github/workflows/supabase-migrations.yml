name: Supabase Migrations

on:
  push:
    branches:
      - main
      - master
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

jobs:
  migrate:
    name: Apply database migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate SUPABASE_DB_URL
        run: |
          test -n "$SUPABASE_DB_URL" || (echo "Missing SUPABASE_DB_URL" && exit 1)
          case "$SUPABASE_DB_URL" in
            postgres://*|postgresql://*) ;;
            *) echo "SUPABASE_DB_URL must start with postgres:// or postgresql://"; exit 1 ;;
          esac
          if printf '%s' "$SUPABASE_DB_URL" | grep -q '[[:space:]]'; then
            echo "SUPABASE_DB_URL contains whitespace. Re-save the secret without spaces/new lines."
            exit 1
          fi
          echo "Using one-secret mode (SUPABASE_DB_URL)"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push pending migrations
        run: supabase db push --db-url "$SUPABASE_DB_URL"
