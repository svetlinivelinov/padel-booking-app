<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Results - Bokacourt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/dashboard.html">Bokacourt</a>
      <div class="d-flex gap-3">
        <a class="nav-link" href="/dashboard.html">Upcoming</a>
        <a class="nav-link" href="/event.html">Events</a>
        <a class="nav-link" href="/court.html">Court</a>
        <a class="nav-link active" href="/results.html">Results</a>
        <a class="nav-link" href="/profile.html">Profile</a>
      </div>
    </div>
  </nav>

  <main class="app-container">
  <section class="py-5">
    <div class="container mb-2">
      <h1 class="page-title">Results by Group</h1>
      <p class="page-subtitle">View finished event standings across all your groups</p>
    </div>

    <div class="container">

      <!-- Filters -->
      <div class="list-card frosted-card mb-4">
        <div class="row g-3 align-items-end">
          <div class="col-12 col-md-5">
            <label class="form-label fw-semibold mb-1">Group</label>
            <select id="results-group-select" class="form-select">
              <option value="">All groups</option>
            </select>
          </div>
          <div class="col-12 col-md-5">
            <label class="form-label fw-semibold mb-1">Search player</label>
            <input id="results-search" type="text" class="form-control" placeholder="Player name...">
          </div>
          <div class="col-12 col-md-2">
            <button id="results-refresh-btn" class="btn btn-sun w-100">Refresh</button>
          </div>
        </div>
      </div>

      <!-- Results list -->
      <div id="results-list">
        <div class="list-card frosted-card text-center py-5 text-muted">
          <div style="font-size:2rem;">📊</div>
          <p class="mb-0 mt-2">Loading results...</p>
        </div>
      </div>

    </div>
  </section>
  </main>

  <script src="/assets/js/env.js"></script>
  <script type="module" src="/assets/js/results.js"></script>
</body>
</html>
