<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Bokacourt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">Bokacourt</a>
      <div class="d-flex gap-3">
        <a class="nav-link" href="/signup.html">Sign up</a>
      </div>
    </div>
  </nav>

  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="hero-card">
            <h2 class="section-title">Welcome back</h2>
            <form id="login-form" class="mt-4">
              <div class="mb-3">
                <label class="form-label" for="login-email">Email</label>
                <input class="form-control" id="login-email" type="email" required>
              </div>
              <div class="mb-3">
                <label class="form-label" for="login-password">Password</label>
                <input class="form-control" id="login-password" type="password" required>
              </div>
              <button class="btn btn-sun" type="submit">Sign in</button>
              <p id="login-status" class="form-status mt-3"></p>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="/assets/js/env.js"></script>
  <script type="module" src="/assets/js/login-script.js"></script>
</body>
</html>
