<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Groups - Bokacourt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/dashboard.html">Bokacourt</a>
      <div class="d-flex gap-3">
        <a class="nav-link active" href="/group.html">Groups</a>
        <a class="nav-link" href="/event.html">Events</a>
        <a class="nav-link" href="/court.html">Court</a>
        <a class="nav-link" href="/profile.html">Profile</a>
      </div>
    </div>
  </nav>

  <section class="py-5">
    <div class="container">
      <div class="row g-4">
        <div class="col-lg-6">
          <div class="hero-card">
            <h3 class="section-title">Create a group</h3>
            <form id="group-create-form" class="mt-3">
              <div class="mb-3">
                <label class="form-label" for="group-name">Group name</label>
                <input class="form-control" id="group-name" type="text" required>
              </div>
              <div class="mb-3">
                <label class="form-label" for="group-description">Description</label>
                <textarea class="form-control" id="group-description" rows="2"></textarea>
              </div>
              <div class="page-actions">
                <button class="btn btn-sun" type="submit">Create</button>
              </div>
            </form>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="hero-card">
            <h3 class="section-title">Join with invite token</h3>
            <form id="group-join-form" class="mt-3">
              <div class="mb-3">
                <label class="form-label" for="group-token">Invite token</label>
                <input class="form-control" id="group-token" type="text" required>
              </div>
              <div class="page-actions">
                <button class="btn btn-sun" type="submit">Join</button>
              </div>
            </form>
            <p id="group-status" class="form-status mt-3"></p>
          </div>
        </div>
      </div>

      <div class="mt-4">
        <h4 class="section-title">Your groups</h4>
        <div id="group-list" class="mt-3"></div>
      </div>
    </div>
  </section>

  <script src="/assets/js/env.js"></script>
  <script type="module" src="/assets/js/groups.js"></script>
</body>
</html>
