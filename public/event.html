<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Events - Bokacourt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/dashboard.html">Bokacourt</a>
      <div class="d-flex gap-3">
        <a class="nav-link" href="/dashboard.html">Upcoming</a>
        <a class="nav-link active" href="/event.html">Events</a>
        <a class="nav-link" href="/court.html">Court</a>
        <a class="nav-link" href="/results.html">Results</a>
        <a class="nav-link" href="/profile.html">Profile</a>
        <a class="nav-link" href="/admin.html">Admin</a>
      </div>
    </div>
  </nav>

  <main class="app-container">
  <section class="py-5">
    <div class="container mb-2">
      <h1 class="page-title">Events</h1>
      <p class="page-subtitle">Create and join padel sessions</p>
    </div>
    <div class="container">
      <div class="row g-3">
        <div class="col-12 col-md-6">
          <details class="event-create-toggle" id="create-group-toggle">
            <summary>Create group</summary>
            <div class="hero-card mt-3">
              <h3 class="section-title">Create a group</h3>
              <form id="group-create-form" class="mt-3">
                <div class="mb-3">
                  <label class="form-label" for="group-name">Group name</label>
                  <input class="form-control" id="group-name" type="text" required>
                </div>
                <div class="mb-3">
                  <label class="form-label" for="group-description">Description</label>
                  <textarea class="form-control" id="group-description" rows="2"></textarea>
                </div>
                <div class="page-actions">
                  <button class="btn btn-sun" type="submit"><span class="btn-icon">+</span>Create group</button>
                </div>
              </form>
              <p id="group-status" class="form-status mt-3"></p>
            </div>
          </details>
        </div>
        <div class="col-12 col-md-6">
          <details class="event-create-toggle">
            <summary>Create event</summary>
            <div class="hero-card mt-3">
              <h3 class="section-title">Create an event</h3>
              <form id="event-create-form" class="mt-3">
                <div class="mb-3">
                  <label class="form-label" for="event-group">Group</label>
                  <select class="form-select" id="event-group"></select>
                  <div class="mt-2">
                    <button class="btn btn-ghost btn-sm" type="button" id="open-create-group">+ Create group</button>
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label" for="event-date">Date and time</label>
                  <input class="form-control" id="event-date" type="datetime-local" required>
                </div>
                <div class="mb-3">
                  <label class="form-label" for="event-type">Event type</label>
                  <select class="form-select" id="event-type">
                    <option value="individual">Individual</option>
                    <option value="couples">Couples</option>
                  </select>
                </div>
                <div class="mb-3">
                  <label class="form-label" for="event-max">Max participants</label>
                  <input class="form-control" id="event-max" type="number" min="2" value="16">
                </div>
                <div class="mb-3">
                  <label class="form-label" for="event-desc">Description</label>
                  <textarea class="form-control" id="event-desc" rows="2"></textarea>
                </div>
                <div class="mb-3">
                  <label class="form-label" for="event-location">Location / Court</label>
                  <input class="form-control" id="event-location" type="text" placeholder="e.g. Padel Club Sofia, Court 3">
                </div>
                <div class="mb-3">
                  <label class="form-label" for="event-notes">Notes</label>
                  <textarea class="form-control" id="event-notes" rows="2" placeholder="Bring your own racket, parking info..."></textarea>
                </div>
                <div class="page-actions">
                  <button class="btn btn-sun" type="submit">Create event</button>
                </div>
              </form>
              <p id="event-status" class="form-status mt-3"></p>
            </div>
          </details>
        </div>
        <div class="col-12">
          <div class="hero-card">
            <h3 class="section-title">Events</h3>
            <div class="mt-3">
              <label class="form-label" for="event-slot-type">Joining as</label>
              <select class="form-select" id="event-slot-type">
                <option value="individual">Individual</option>
                <option value="couple">Couple</option>
              </select>
              <input class="form-control mt-2" id="event-partner-name" type="text" placeholder="Partner name (optional)">
            </div>
            <div id="event-list" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </section>
  </main>

  <script src="/assets/js/env.js"></script>
  <script type="module">
    import "/assets/js/groups.js";
    import "/assets/js/events.js";
    import { refreshGroups } from "/assets/js/groups.js";
    document.addEventListener("DOMContentLoaded", () => {
      refreshGroups();
      const params = new URLSearchParams(window.location.search);
      const openCreateGroup = params.get("createGroup");
      const createGroupToggle = document.getElementById("create-group-toggle");
      const openCreateGroupBtn = document.getElementById("open-create-group");

      if (openCreateGroup === "1" && createGroupToggle) {
        createGroupToggle.open = true;
      }

      openCreateGroupBtn?.addEventListener("click", () => {
        if (createGroupToggle) {
          createGroupToggle.open = true;
          createGroupToggle.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      });

      const dateInput = document.getElementById("event-date");
      if (dateInput) {
        dateInput.addEventListener("change", () => {});
      }
      const typeSelect = document.getElementById("event-type");
      const maxInput   = document.getElementById("event-max");
      if (typeSelect && maxInput) {
        typeSelect.addEventListener("change", () => {
          maxInput.value = typeSelect.value === "couples" ? 8 : 16;
        });
      }
    });
  </script>
</body>
</html>
