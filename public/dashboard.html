<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - Bokacourt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold brand-stack" href="/dashboard.html">
        <span>Bokacourt</span>
        <span id="user-display" class="brand-user"></span>
      </a>
      <div class="d-flex gap-3">
        <a class="nav-link active" href="/dashboard.html">Upcoming</a>
        <a class="nav-link" id="events-nav-link" href="/event.html">Events</a>
        <a class="nav-link" href="/court.html">Court</a>
        <a class="nav-link" href="/results.html">Results</a>
        <a class="nav-link" href="/profile.html">Profile</a>
      </div>
    </div>
  </nav>

  <main class="app-container">
  <section class="py-5">
    <div class="container mb-2">
      <h1 class="page-title">Upcoming Events</h1>
      <p class="page-subtitle">Manage your matches and partners</p>
    </div>
    <div class="container">
      <div class="row g-3 align-items-center compact-filter-row">
        <div class="col-lg-2 col-md-3">
          <label class="form-label mb-0" for="group-select">Upcoming</label>
        </div>
        <div class="col-lg-6 col-md-9">
          <select id="group-select" class="form-select"></select>
          <div class="mt-2">
            <a class="btn btn-ghost btn-sm" href="/event.html?createGroup=1">+ Create group</a>
          </div>
        </div>
      </div>
      <div class="row g-4 mt-1">
        <div class="col-12">
          <div class="hero-card">
            <h3 class="section-title">Upcoming events</h3>
            <div id="event-feed" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </section>
  </main>

  <script src="/assets/js/env.js"></script>
  <script type="module">
    import { getUser } from "/assets/js/auth.js";
    import { getProfile } from "/assets/js/database.js";
    (async () => {
      const user = await getUser();
      const displayEl = document.getElementById("user-display");
      if (!displayEl) return;

      if (user) {
        let display = user.email || "Player";
        try {
          const { data } = await getProfile(user.id);
          if (data?.display_name) {
            display = data.display_name;
          } else if (data?.username) {
            display = data.username;
          }
        } catch {}
        displayEl.textContent = display;
      } else {
        displayEl.textContent = "";
      }
    })();
  </script>
  <script type="module" src="/assets/js/groups.js"></script>
  <script type="module" src="/assets/js/feed.js"></script>
  <script type="module">
    // Update Events navbar link to include selected group
    const groupSelect = document.getElementById("group-select");
    const eventsNavLink = document.getElementById("events-nav-link");
    if (groupSelect && eventsNavLink) {
      groupSelect.addEventListener("change", () => {
        const groupId = groupSelect.value;
        if (groupId) {
          eventsNavLink.href = `/event.html?group=${groupId}`;
        } else {
          eventsNavLink.href = "/event.html";
        }
      });
      // Set initial link
      if (groupSelect.value) {
        eventsNavLink.href = `/event.html?group=${groupSelect.value}`;
      }
    }
  </script>
</body>
</html>
