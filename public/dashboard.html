<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - Bokacourt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/dashboard.html">Bokacourt <span id="user-display" class="fw-normal" style="font-size:0.9em;"></span></a>
      <div class="d-flex gap-3">
        <a class="nav-link" href="/group.html">Groups</a>
        <a class="nav-link" href="/event.html">Events</a>
        <a class="nav-link" href="/court.html">Court</a>
        <a class="nav-link" href="/profile.html">Profile</a>
        <button id="signout-btn" class="btn btn-link nav-link p-0 ms-2" style="color:inherit;">Sign out</button>
      </div>
    </div>
  </nav>

  <section class="py-5">
    <div class="container">
      <div class="row g-4">
        <div class="col-lg-4">
          <div class="card-soft">
            <h3 class="section-title">Group selector</h3>
            <select id="group-select" class="form-select mt-3"></select>
          </div>
        </div>
        <div class="col-lg-8">
          <div class="hero-card">
            <h3 class="section-title">Upcoming events</h3>
            <div id="event-feed" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="/assets/js/env.js"></script>
  <script type="module">
    import { getUser } from "/assets/js/auth.js";
    import { getProfile } from "/assets/js/database.js";
    (async () => {
      const user = await getUser();
      if (user) {
        // Try to get display name from profile
        let display = user.email;
        try {
          const { data } = await getProfile(user.id);
          if (data && data.display_name) display = data.display_name;
        } catch {}
        document.getElementById("user-display").textContent = `(${display})`;
      }
    })();
  </script>
  <script type="module">
    import { signOut } from "/assets/js/auth.js";
    const btn = document.getElementById("signout-btn");
    if (btn) {
      btn.addEventListener("click", async () => {
        await signOut();
        window.location.href = "/login.html";
      });
    }
  </script>
  <script type="module" src="/assets/js/groups.js"></script>
  <script type="module" src="/assets/js/feed.js"></script>
</body>
</html>
