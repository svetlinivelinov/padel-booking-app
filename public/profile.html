<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile - Bokacourt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/dashboard.html">Bokacourt</a>
      <div class="d-flex gap-3">
        <a class="nav-link" href="/dashboard.html">Upcoming</a>
        <a class="nav-link" href="/event.html">Events</a>
        <a class="nav-link" href="/court.html">Court</a>
        <a class="nav-link" href="/results.html">Results</a>
        <a class="nav-link active" href="/profile.html">Profile</a>
      </div>
    </div>
  </nav>

  <main class="app-container">
  <section class="py-5">
    <div class="container mb-2">
      <h1 class="page-title">Profile</h1>
      <p class="page-subtitle">Manage your account details</p>
    </div>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-7">
          <div class="hero-card">
            <h2 class="section-title">Profile</h2>
            <form id="profile-form" class="mt-4">
              <div class="mb-3">
                <label class="form-label" for="profile-display">Display name</label>
                <input class="form-control" id="profile-display" type="text">
              </div>
              <div class="mb-3">
                <label class="form-label" for="profile-username">Username</label>
                <input class="form-control" id="profile-username" type="text">
              </div>
              <div class="mb-3">
                <label class="form-label" for="profile-bio">Bio</label>
                <textarea class="form-control" id="profile-bio" rows="2"></textarea>
              </div>
              <div class="mb-3">
                <label class="form-label" for="profile-location">Location</label>
                <input class="form-control" id="profile-location" type="text">
              </div>
              <div class="mb-3">
                <label class="form-label" for="profile-skill">Skill level</label>
                <input class="form-control" id="profile-skill" type="text">
              </div>
              <div class="page-actions">
                <button class="btn btn-sun" type="submit">Save profile</button>
              </div>
              <p id="profile-status" class="form-status mt-3"></p>
            </form>
          </div>
        </div>
        <div class="col-lg-7 mt-3">
          <div class="card-soft danger-zone-card">
            <button id="signout-btn" class="btn btn-outline-danger btn-ghost-danger" type="button">Sign out</button>
          </div>
        </div>
      </div>
    </div>
  </section>
  </main>

  <script src="/assets/js/env.js"></script>
  <script type="module">
    import { signOut } from "/assets/js/auth.js";
    const signoutBtn = document.getElementById("signout-btn");
    if (signoutBtn) {
      signoutBtn.addEventListener("click", async () => {
        signoutBtn.disabled = true;
        try {
          await signOut();
          window.location.href = "/login.html";
        } catch (error) {
          alert(error.message || "Failed to sign out");
          signoutBtn.disabled = false;
        }
      });
    }
  </script>
  <script type="module" src="/assets/js/profile.js"></script>
</body>
</html>
