<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bokacourt — Court</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/dashboard.html">Bokacourt</a>
      <div class="d-flex gap-3">
        <a href="/dashboard.html" class="nav-link">Upcoming</a>
        <a href="/event.html" class="nav-link">Events</a>
        <a href="/court.html" class="nav-link active">Court</a>
        <a href="/results.html" class="nav-link">Results</a>
        <a href="/profile.html" class="nav-link">Profile</a>
        <a href="/admin.html" class="nav-link">Admin</a>
      </div>
    </div>
  </nav>

  <main class="app-container">
  <section class="py-5">
    <div class="container mb-2">
      <h1 class="page-title">Court</h1>
      <p class="page-subtitle">Start or follow the current game</p>
    </div>
  <div class="container" style="max-width:700px">

    <!-- Event selector -->
    <div class="list-card mb-4 frosted-card">
      <label class="fw-semibold mb-2 d-block">Select event</label>
      <select id="court-event-select" class="form-select"></select>
    </div>

    <!-- Start game panel (organizer only, game not started) -->
    <div id="start-panel" class="list-card mb-4 frosted-card" style="display:none">
      <h5 class="fw-semibold mb-3">Start game</h5>
      <div class="mb-3">
        <label class="form-label small">Points per match</label>
        <input type="number" id="points-per-match" class="form-control" value="16" min="8" max="32" style="max-width:120px"/>
      </div>
      <div class="mb-3">
        <label class="form-label small">Number of rounds</label>
        <input type="number" id="total-rounds" class="form-control" value="6" min="1" max="12" style="max-width:120px"/>
      </div>
      <div class="page-actions">
        <button id="start-btn" class="btn btn-primary cta-btn">Start game</button>
      </div>
      <div id="start-status" class="small text-muted mt-2"></div>
    </div>

    <!-- Active game panel -->
    <div id="game-panel" style="display:none">

      <!-- Round info + finalize button -->
      <div class="list-card mb-3 d-flex justify-content-between align-items-center frosted-card flex-wrap gap-2">
        <div>
          <span class="fw-semibold" id="round-label">Round 1</span>
          <span class="text-muted small ms-2" id="round-sub"></span>
        </div>
        <div class="d-flex gap-2">
          <button id="next-round-btn" class="btn btn-sm btn-primary cta-btn" style="display:none">
            Next round →
          </button>
          <!-- Finalize button — visible only for organizer, injected by court.js -->
          <button id="finalize-btn" class="btn btn-sm btn-danger" style="display:none">
            🏁 Финализирай събитието
          </button>
        </div>
      </div>

      <!-- Court cards -->
      <div id="court-cards" class="mb-4"></div>

      <!-- Leaderboard -->
      <div class="list-card frosted-card">
        <h6 class="fw-semibold mb-3">Leaderboard</h6>
        <div id="leaderboard"></div>
      </div>

    </div>

    <!-- Final / Summary screen -->
    <div id="final-panel" style="display:none"></div>

    <!-- Empty state panel -->
    <div id="empty-panel" class="list-card frosted-card court-empty-state" style="display:none">
      <div class="court-empty-icon">[]</div>
      <h5 class="mb-2">No active game right now</h5>
      <p class="mb-2 text-muted">Pick an event to check its current court status.</p>
      <p class="mb-0"><strong>Next event:</strong> <span id="empty-next-event">TBD</span></p>
    </div>

  </div>
  </section>
  </main>

  <script src="/assets/js/env.js"></script>
  <script type="module" src="/assets/js/court.js"></script>
</body>
</html>
